<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>جمعية AI — Smart Savings Circles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Sans Arabic', system-ui, sans-serif;
      background: #F7F5F0;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    input[type=range] { -webkit-appearance: none; height: 6px; border-radius: 999px; background: #E8EAF0; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #0D1F3C; cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E8EAF0; border-radius: 99px; }
    * { -webkit-tap-highlight-color: transparent; }
    input, button, textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens1.jsx"></script>
  <script type="text/babel" src="screens2.jsx"></script>
  <script type="text/babel" src="screens3.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "lang": "ar",
      "trustScoreDemo": 520,
      "darkHero": true,
      "showSmartMatch": true
    }/*EDITMODE-END*/;

    function TierLabel({ score, lang }) {
      const tier = DS.getTier(score);
      const t = DS.tiers[tier];
      return (
        <div style={{ marginTop: 6, fontSize: 12, color: '#6B7A99', textAlign: 'center' }}>
          <span style={{ color: t.color, fontWeight: 700 }}>{score} — {lang === 'ar' ? t.ar : t.en}</span>
        </div>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const [screen, setScreen] = React.useState('landing');
      const [lang, setLang] = React.useState(tweaks.lang || 'ar');
      const [user, setUser] = React.useState(null);
      const [selectedJam, setSelectedJam] = React.useState(null);

      // Sync lang from tweaks
      React.useEffect(() => { setLang(tweaks.lang || 'ar'); }, [tweaks.lang]);

      // Sync dir on html element
      React.useEffect(() => {
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = lang;
      }, [lang]);

      const nav = { screen, setScreen, lang, setLang, user, setUser, selectedJam, setSelectedJam };

      const demoUser = { ...MOCK_USER, trustScore: tweaks.trustScoreDemo };

      const renderScreen = () => {
        switch (screen) {
          case 'landing':     return <LandingScreen nav={nav} />;
          case 'onboarding':  return <OnboardingScreen nav={nav} />;
          case 'dashboard':   return <DashboardScreen nav={{ ...nav, user: user || demoUser }} />;
          case 'marketplace': return <MarketplaceScreen nav={nav} />;
          case 'create':      return <CreateScreen nav={nav} />;
          case 'detail':      return <DetailScreen nav={nav} />;
          case 'payment':     return <PaymentScreen nav={nav} />;
          default:            return <LandingScreen nav={nav} />;
        }
      };

      return (
        <div style={{ fontFamily: "'IBM Plex Sans Arabic', system-ui, sans-serif", minHeight: '100vh' }}>
          {renderScreen()}

          <TweaksPanel>
            <TweakSection title={lang === 'ar' ? 'اللغة' : 'Language'}>
              <TweakRadio tweakKey="lang" options={[
                { value: 'ar', label: 'عربي (RTL)' },
                { value: 'en', label: 'English (LTR)' },
              ]} />
            </TweakSection>

            <TweakSection title={lang === 'ar' ? 'درجة الثقة (التجريبي)' : 'Trust Score (Demo)'}>
              <TweakSlider tweakKey="trustScoreDemo" min={100} max={1000} step={10} />
              <TierLabel score={tweaks.trustScoreDemo} lang={lang} />
            </TweakSection>

            <TweakSection title={lang === 'ar' ? 'التنقل السريع' : 'Quick Nav'}>
              {['landing', 'onboarding', 'dashboard', 'marketplace', 'create', 'detail', 'payment'].map(s => (
                <button key={s} onClick={() => setScreen(s)}
                  style={{ width: '100%', marginBottom: 6, padding: '8px 12px', background: screen === s ? '#0D1F3C' : '#F7F5F0', color: screen === s ? '#fff' : '#0D1F3C', border: '1px solid #E8EAF0', borderRadius: 8, cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, fontWeight: 600, textAlign: 'start' }}>
                  {screen === s ? '▶ ' : ''}{s}
                </button>
              ))}
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
      <rect width="120" height="80" fill="#0D1F3C"/>
      <circle cx="60" cy="40" r="22" fill="none" stroke="#C4963E" stroke-width="2"/>
      <circle cx="60" cy="40" r="8" fill="#C4963E"/>
      <text x="60" y="72" text-anchor="middle" fill="#C4963E" font-size="8" font-family="sans-serif" font-weight="bold">جمعية AI</text>
    </svg>
  </template>
</body>
</html>
